{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
  <div class="row g-4">

    <!-- Card 1 -->
     {% for post in posts %}
    <div class="col-md-4">
      <div class="card shadow-lg border-0 h-100 p-4 text-center">
        <div class="card-body">
          <h5 class="card-title">{{ post.title }}</h5>
          <p class="card-text">{{ post.content }}</p>
          <small class="text-muted">By {{ post.author.name }}</small><br>
          <p>Category: 
                {% for category in post.category.all %}
                <batton class="btn btn-sm btn-secondary disabled">{{ category.name }}</batton>
                
                {% endfor %}
            </p>
            <a href="{% url 'edit_post' post.id %}" class="btn btn-primary">Edit</a>
            <a href="{% url 'delete_post' post.id %}" class="btn btn-danger">Delete</a>

        </div>
      </div>
    </div>
    {% endfor %}
    

    

  </div>
</div>

{% endblock %}
